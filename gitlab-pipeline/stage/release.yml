#
# Release jobs are based on a base CI job and come in two flavors:
# - automatic: we use "dependencies" to make sure all previous stages completed
# - and manual: we use "needs" to give the release coordinator the control, for example
#   to publish artifacts in order to early start manual tests or to do it despite errors
#   in previous stages. With great power comes great responsibility.
#

.release:testing-boards:beagleboneblack:
  tags:
    - mender-qa-worker-generic-light
  stage: release
  image: debian:12
  variables:
    # Final CI jobs extending this base job shall define BBB_RELEASE_VERSION
    BBB_RELEASE_VERSION: "none"
  before_script:
    - apt update && apt install -yyq awscli
  script:
    # Publish Mender artifact
    - aws s3 cp stage-artifacts/beagleboneblack_release_1_${BBB_RELEASE_VERSION}.mender
        s3://mender/${BBB_RELEASE_VERSION}/beagleboneblack/beagleboneblack_release_1_${BBB_RELEASE_VERSION}.mender
    - aws s3api put-object-acl --acl public-read --bucket mender
        --key ${BBB_RELEASE_VERSION}/beagleboneblack/beagleboneblack_release_1_${BBB_RELEASE_VERSION}.mender
    # And disk image
    - aws s3 cp stage-artifacts/mender-beagleboneblack_${BBB_RELEASE_VERSION}.sdimg.gz
        s3://mender/${BBB_RELEASE_VERSION}/beagleboneblack/mender-beagleboneblack_${BBB_RELEASE_VERSION}.sdimg.gz
    - aws s3api put-object-acl --acl public-read --bucket mender
        --key ${BBB_RELEASE_VERSION}/beagleboneblack/mender-beagleboneblack_${BBB_RELEASE_VERSION}.sdimg.gz

release:legacy-5.0.x:testing-boards:beagleboneblack:manual:
  needs:
    - build:acceptance:beagleboneblack
  when: manual
  only:
    variables:
      - $BUILD_BEAGLEBONEBLACK == "true"
  extends: .release:testing-boards:beagleboneblack
  variables:
    BBB_RELEASE_VERSION: "${MENDER_REV}"

release:testing-boards:beagleboneblack:manual:
  needs:
    - build:acceptance:beagleboneblack
  when: manual
  only:
    variables:
      - $BUILD_BEAGLEBONEBLACK == "true"
  extends: .release:testing-boards:beagleboneblack
  variables:
    BBB_RELEASE_VERSION: "${MENDER_CLIENT_SUBCOMPONENTS_REV}"

release:testing-boards:beagleboneblack:automatic:
  variables:
    PUBLISH_BOARD_NAME: beagleboneblack
  dependencies:
    - build:acceptance:beagleboneblack
    - trigger:integration-tests
  only:
    variables:
      - $PUBLISH_RELEASE_AUTOMATIC == "true" && $BUILD_BEAGLEBONEBLACK == "true"
  extends: .release:testing-boards:beagleboneblack
  variables:
    BBB_RELEASE_VERSION: "${MENDER_CLIENT_SUBCOMPONENTS_REV}"

.release:mender-monitor:
  tags:
    - mender-qa-worker-generic-light
  stage: release
  image: debian:12
  variables:
    S3_BUCKET_NAME: "mender-binaries"
    S3_BUCKET_PATH: "mender-monitor/yocto"
  before_script:
    - apt update && apt install -yyq awscli
  script:
    - echo "=== mender-monitor $MONITOR_CLIENT_REV ==="
    - echo "Publishing $MONITOR_CLIENT_REV version to s3://$S3_BUCKET_NAME/$S3_BUCKET_PATH/$MONITOR_CLIENT_REV/"
    - aws s3 cp stage-artifacts/mender-monitor/mender-monitor-*.tar.gz s3://$S3_BUCKET_NAME/$S3_BUCKET_PATH/$MONITOR_CLIENT_REV/

release:mender-monitor:manual:
  needs:
    - build:mender-monitor
  when: manual
  extends: .release:mender-monitor

release:mender-monitor:automatic:
  dependencies:
    - build:mender-monitor
    - trigger:integration-tests
  only:
    variables:
      - $PUBLISH_RELEASE_AUTOMATIC == "true"
  extends: .release:mender-monitor

.docker_login_registries: &docker_login_registries |
  if [ -n "$REGISTRY_MENDER_IO_PASSWORD" ]; then \
    echo "${REGISTRY_MENDER_IO_PASSWORD}" | docker login -u "${REGISTRY_MENDER_IO_USERNAME}" --password-stdin registry.mender.io || \
    echo "Warning: registry.mender.io credentials invalid"; \
  else \
    echo "Warning: registry.mender.io credentials unavailable"; \
  fi; \
  if [ -n "$DOCKER_HUB_PASSWORD" ]; then \
    unset DOCKER_AUTH_CONFIG; \
    echo "${DOCKER_HUB_PASSWORD}" | docker login -u "${DOCKER_HUB_USERNAME}" --password-stdin || \
    echo "Warning: Docker Hub credentials invalid"; \
  else \
    echo "Warning: Docker Hub credentials unavailable"; \
  fi; \
  docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY

.release:virtual-client:
  tags:
    - hetzner-amd-beefy
  stage: release
  image: "registry.gitlab.com/northern.tech/mender/mender-test-containers:docker-multiplatform-buildx-v1-master"
  services:
    - name: ${CI_DEPENDENCY_PROXY_DIRECT_GROUP_IMAGE_PREFIX}/docker:28-dind
      alias: docker
  variables:
    # Final CI jobs extending this base job shall define VIRTUAL_CLIENT_VERSION
    VIRTUAL_CLIENT_VERSION: "none"
  before_script:
    # Check correct dind setup
    - docker version
    # Login for private repos
    - *docker_login_registries
  script:
    # Load, tag and push Mender Client images
    - |
      images="mender-client-docker-addons mender-client-qemu mender-client-qemu-rofs"
      for image in $images; do
          regctl image copy ${GITLAB_REGISTRY_PREFIX}-${image} docker.io/mendersoftware/${image}:${VIRTUAL_CLIENT_VERSION}
      done

      image="mender-client-qemu-extended"
      if docker pull ${GITLAB_REGISTRY_PREFIX}-${image}; then
          regctl image copy ${GITLAB_REGISTRY_PREFIX}-${image} docker.io/mendersoftware/${image}:${VIRTUAL_CLIENT_VERSION}
      else
        echo "Skipping 'mender-client-qemu-extended'"
        echo "The meta-mender branch does most likely not contain meta-mender-extended"
      fi

      enterprise_images="mender-monitor-qemu-commercial mender-qemu-rofs-commercial"
      for image in $enterprise_images; do
          regctl image copy ${GITLAB_REGISTRY_PREFIX}-${image} registry.mender.io/mendersoftware/${image}:${VIRTUAL_CLIENT_VERSION}
      done

release:legacy-5.0.x:virtual-client:manual:
  needs:
    - build:client:qemu
    - build:client:docker
  rules:
    - if: $BUILD_CLIENT == "true"
  when: manual
  extends: .release:virtual-client
  variables:
    # Historical note,
    # The version here used to be determined by the release_tool, which could distinguish between
    # git repo version and container image version. Today this is kind of messy, as we moved out
    # the backend to a separate repo but we haven't done deep changes in the release process for
    # the rest, and "--version-of" option gives bogus results.
    # TLDR; hardcode to mender-${INTEGRATION_REV} version for the Virtual Devices images
    VIRTUAL_CLIENT_VERSION: "mender-${INTEGRATION_REV}"

release:virtual-client:manual:
  needs:
    - build:client:qemu
    - build:client:docker
  rules:
    - if: $BUILD_CLIENT == "true"
  when: manual
  extends: .release:virtual-client
  variables:
    VIRTUAL_CLIENT_VERSION: "client-${MENDER_CLIENT_SUBCOMPONENTS_REV}"

release:virtual-client:automatic:
  dependencies:
    - build:client:qemu
    - build:client:docker
    - trigger:integration-tests
  rules:
    - if: $PUBLISH_DOCKER_CLIENT_IMAGES == "true" && $BUILD_CLIENT == "true"
  extends: .release:virtual-client
  variables:
    VIRTUAL_CLIENT_VERSION: "client-${MENDER_CLIENT_SUBCOMPONENTS_REV}"
